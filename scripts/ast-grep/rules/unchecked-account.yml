id: unchecked-account
message: >-
  UncheckedAccount usage detected. In Anchor, UncheckedAccount bypasses
  automatic account validation. It must be accompanied by a /// CHECK:
  doc comment explaining why it is safe.
severity: warning
language: rust
rule:
  pattern: "UncheckedAccount<'$LIFETIME>"
note: >-
  When using UncheckedAccount in Anchor, you must add a /// CHECK: doc comment
  on the preceding line explaining the safety rationale. Without this, Anchor
  will refuse to compile. If the comment is present but the rationale is weak,
  flag for manual review. Raw AccountInfo usage in native programs is expected
  and handled by the missing-signer rule instead.
